# SO-101 PickOrange — StarVLA QwenGR00T (Qwen3-VL-8B vision + GR00T flow-matching head)
# Variant of so101_qwen_gr00t.yaml: same QwenGR00T framework + head, bigger frozen VLM.
# Code is unchanged: QwenGR00T aligns cross_attention_dim to the loaded VLM's real
# hidden_size at runtime (4096 here), so swapping 4B->8B needs no source/patch change.
# Only base_vlm / vl_hidden_dim / batch / run_id differ from Run-1.
run_id: so101_pickorange_qwen3vl8b_gr00t
run_root_dir: /root/autodl-tmp/starvla-outputs
seed: 42
wandb_entity: ""
wandb_project: starVLA_SO101
is_debug: false
version_id: "0.21"

framework:
  name: QwenGR00T
  qwenvl:
    base_vlm: /root/autodl-tmp/models/Qwen3-VL-8B-Instruct
    attn_implementation: flash_attention_2   # NOTE: dead on Qwen3 path — QWen3.py forces
                                   # attn="sdpa" unconditionally. Do NOT count flash-attn
                                   # memory savings; peak is sdpa-attention sized.
    vl_hidden_dim: 4096            # Qwen3-VL-8B text hidden (4B was 2048); cosmetic for
                                   # QwenGR00T (it reads model.config.hidden_size), but kept
                                   # correct for heads that DO read this field.
  action_model:
    action_dim: 6
    state_dim: 6
    action_horizon: 16
    # repeated_diffusion_steps (default 8) repeats last_hidden 8x into the DiT cross-attn
    # (QwenGR00T.py:205). With 8B's wider 4096 hidden this is the SHARPEST peak term and the
    # FIRST OOM lever — drop to 4 before touching batch. Left unset = same as Run-1 (4B).

datasets:
  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: /root/autodl-tmp/datasets
    data_mix: so101_pickorange
    lerobot_version: v2.0          # our dataset is v2.1 -> read via v2.0 file layout
    sequential_step_sampling: false
    per_device_batch_size: 4       # 8B frozen weights ~16G bf16; bs=4 keeps peak ~33-40G on
                                   # a 48G 4090 (bs=8 risked ~41-50G OOM). Bump to 6 if headroom.
    load_all_data_for_training: true
    video_backend: torchvision_av

trainer:
  max_train_steps: 60000           # bs halved vs Run-1 (8) -> 2x steps for same ~6.6 epoch
  num_warmup_steps: 1500
  save_interval: 6000              # 10 slices for incremental sanity eval (LeIsaac rule)
  eval_interval: 100000            # no in-train sim eval here -> effectively off
  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: 'qwen_vl_interface'
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1   # must match ds_config.yaml (deepspeed hardcodes 1)
  gradient_checkpointing: true     # NOTE: dead field on Qwen3 path (QWen3.py ignores it),
                                   # and moot anyway — frozen VLM has no backward to checkpoint.
                                   # Kept only for parity with Run-1's config diff.
  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08
