# SO-101 PickOrange — StarVLA QwenGR00T (Qwen3-VL-2B vision + GR00T flow-matching head)
# Variant of so101_qwen_gr00t.yaml: same QwenGR00T framework + head, SMALLER frozen VLM.
# Qwen3-VL-2B text hidden_size = 2048 (SAME as 4B), 28 layers — so this is the 4B config
# with only base_vlm + run_id changed: vl_hidden_dim stays 2048, bs stays 8 (2B ~4G bf16
# fits the 4080-32G easily), 30k steps. Code unchanged (QwenGR00T aligns cross_attention_dim
# to the loaded VLM hidden_size at runtime). Trains on westc (RTX 4080 SUPER 32G).
run_id: so101_pickorange_qwen3vl2b_gr00t
run_root_dir: /root/autodl-tmp/starvla-outputs
seed: 42
wandb_entity: ""
wandb_project: starVLA_SO101
is_debug: false
version_id: "0.21"

framework:
  name: QwenGR00T
  qwenvl:
    base_vlm: /root/autodl-tmp/models/Qwen3-VL-2B-Instruct
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2048            # Qwen3-VL-2B text hidden = 2048 (same as 4B)
  action_model:
    action_dim: 6
    state_dim: 6
    action_horizon: 16

datasets:
  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: /root/autodl-tmp/datasets
    data_mix: so101_pickorange
    lerobot_version: v2.0          # our dataset is v2.1 -> read via v2.0 file layout
    sequential_step_sampling: false
    per_device_batch_size: 8       # 2B is smaller than 4B -> same bs=8 as Run-1, fits 32G
    load_all_data_for_training: true
    video_backend: torchvision_av

trainer:
  max_train_steps: 30000           # bs=8 same as 4B Run-1 -> same step budget (~6.6 epoch)
  num_warmup_steps: 1500
  save_interval: 1000              # DENSER than 4B's 1500: the overfit peak is a sharp cliff
                                   # (cf. 8B 30k=7/9 -> 36k=0/9), and 2B's weaker frozen
                                   # features likely peak earlier/sharper than 4B. 1000 -> 30
                                   # ckpts, so the peak is bracketed finely (eval focuses the
                                   # ~8-18k region; coarse-scan the rest).
  eval_interval: 100000
  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: 'qwen_vl_interface'
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1
  gradient_checkpointing: true
  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08
