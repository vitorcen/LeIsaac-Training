# SO-101 PickOrange — StarVLA QwenGR00T_N17 (GR00T_v2) head + PARTIAL-UNFREEZE top-4 Qwen3-VL LLM layers.
# Next experiment after the 🔴 head-only negative (step-17500 strict 13.3%, P(3)=0):
# the head-only freeze gives a GENERIC web-pretrained Qwen3-VL no way to adapt its features
# to the robot task. GR00T N1.6 unfroze the TOP 4 layers of its (also generic) Eagle backbone
# for exactly this (tune_top_llm_layers=4 was its DEFAULT); N1.7 re-froze only because its
# Cosmos backbone is embodiment-pretrained — not our case. So: head + top-4 Qwen3-VL LLM
# layers co-trained. Design doc §11: docs/training/starvla_gr00t_v2_head_design.html
run_id: so101_pickorange_qwen3vl8b_gr00t_v2_unfreeze4
run_root_dir: /root/autodl-tmp/starvla-outputs
seed: 42
wandb_entity: ""
wandb_project: starVLA_SO101
is_debug: false
version_id: "0.21"

framework:
  name: QwenGR00T_N17
  qwenvl:
    base_vlm: /root/autodl-tmp/models/Qwen3-VL-8B-Instruct
    attn_implementation: flash_attention_2
    vl_hidden_dim: 4096
    tune_top_llm_layers: 4        # ← partial unfreeze: top 4 of 36 LLM layers re-opened
                                  #   AFTER freeze_modules freezes the whole VLM
  action_model:
    action_dim: 6
    state_dim: 6
    action_horizon: 16
    action_model_type: "DiT-N17"
    use_vlln: true
    use_alternate_vl_dit: true
    attend_text_every_n_blocks: 2
    state_dropout_prob: 0.2
    num_target_vision_tokens: 0
    vl_self_attention_cfg: null
    vl_proj_dim: null
    repeated_diffusion_steps: 4    # ← OOM lever #1: halved vs head-only's 8. Unfreezing 4
                                  #   layers adds ~880M trainable + AdamW state (~7G) +
                                  #   backward activations; head-only peaked at 37.3G/48G,
                                  #   so rep 8→4 buys headroom for the unfreeze.
    diffusion_model_cfg:
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: ada_norm
      num_layers: 16
      output_dim: 1024
      positional_embeddings: null

datasets:
  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: /root/autodl-tmp/datasets
    data_mix: so101_pickorange
    lerobot_version: v2.0
    sequential_step_sampling: false
    per_device_batch_size: 4       # OOM lever #2: drop to 2 (then 2× steps) if it still OOMs;
                                  # lever #3 = tune_top_llm_layers 4→2.
    load_all_data_for_training: true
    video_backend: torchvision_av

trainer:
  max_train_steps: 50000           # ~5.5ep @ bs4; peak likely shifts vs head-only -> sweep finds it
  num_warmup_steps: 1500
  save_interval: 2500
  eval_interval: 100000
  keep_last_checkpoints: 2
  # freeze the whole VLM by name; apply_partial_unfreeze() then re-opens the top 4 LLM
  # layers (runs in train_starvla.py right after freeze_backbones). The top-4 layers train
  # at the qwen_vl_interface LR below (1e-5, gentle to avoid catastrophic forgetting),
  # the head at action_model LR (1e-4).
  freeze_modules: 'qwen_vl_interface'
  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 1.0e-05     # ← applies to the unfrozen top-4 LLM layers
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1
  gradient_checkpointing: true     # NOW load-bearing: the unfrozen top-4 layers HAVE backward,
                                  # so gradient_checkpointing genuinely saves activation VRAM
                                  # here (unlike the fully-frozen head-only run where it was dead).
  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08
