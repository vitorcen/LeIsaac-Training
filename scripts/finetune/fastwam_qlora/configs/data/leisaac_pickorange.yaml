train:
  _target_: fastwam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
  dataset_dirs:
    # LeRobot v2.1 format (per-episode parquet + tasks.jsonl).
    # The v3.0 `leisaac-pick-orange/` uses tasks.parquet which the bundled
    # lerobot doesn't parse — `_old` is the v2.1 snapshot of the same data.
    - /home/david/work/isaaclab-experience/LeIsaac/datasets/raw/leisaac-pick-orange_old
  shape_meta:
    images:
      # base_lerobot_dataset.py:71 prepends "observation.images." → key="front" matches "observation.images.front".
      - key: front
        raw_shape: [3, 480, 640]
        shape: [3, 224, 224]
      - key: wrist
        raw_shape: [3, 480, 640]
        shape: [3, 224, 224]
    action:
      # key="default" → lerobot_key="action" (line 85).
      - key: default
        raw_shape: 6  # 6-DoF joint (5 arm + gripper)
        shape: 6
    state:
      # key="default" → lerobot_key="observation.state" (line 78).
      - key: default
        raw_shape: 6
        shape: 6
  num_frames: 33
  global_sample_stride: 1
  action_video_freq_ratio: 4  # 32 actions, 9 video frames
  video_size: [224, 448]  # final concat front+wrist
  camera_key: null
  val_set_proportion: 0.0
  is_training_set: true
  skip_padding_as_possible: false
  concat_multi_camera: "horizontal"
  processor:
    _target_: fastwam.datasets.lerobot.processors.fastwam_processor.FastWAMProcessor
    shape_meta: ${data.train.shape_meta}
    num_obs_steps: ${data.train.num_frames}
    num_output_cameras: 2
    action_output_dim: 6  # 5 joint deltas + gripper absolute
    proprio_output_dim: 6
    delta_action_dim_mask:
      default: [true, true, true, true, true, false]  # arm joints delta, gripper absolute
    action_state_transforms: null
    use_stepwise_action_norm: False
    norm_default_mode: min/max
    norm_exception_mode: null
    action_state_merger:
      _target_: fastwam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign
    train_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [224, 224]
    val_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [224, 224]
  text_embedding_cache_dir: ./data/text_embeds_cache/leisaac_pickorange
  context_len: 128
