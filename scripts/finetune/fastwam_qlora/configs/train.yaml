# @package _global_
# FastWAM QLoRA finetune root config for LeIsaac SO-101 PickOrange.

defaults:
  - _self_
  - data: leisaac_pickorange
  - model: fastwam_qlora
  - task: leisaac_pickorange_qlora


output_dir: ./runs/train/fastwam_qlora_pickorange/${now:%Y-%m-%d}_${now:%H-%M-%S}

# dataloading (small batch — QLoRA on a single 24GB)
batch_size: 1
num_workers: 4

# scheduler
lr_scheduler_type: "cosine"
learning_rate: 5.0e-5
num_epochs: 1
max_steps: 10000
log_every: 10
save_every: 1000
eval_every: 500
eval_num_inference_steps: 10

# training
gradient_accumulation_steps: 4
mixed_precision: "bf16"
seed: 42
max_grad_norm: 1.0
weight_decay: 0.0
resume: null

# QLoRA-specific (consumed by train.py before handing off to trainer)
qlora:
  lora_r: 16
  lora_alpha: 16
  lora_dropout: 0.0
  target_modules: [q, k, v, o]

# wandb
wandb:
  enabled: false
  workspace: null
  project: fast-wam-qlora-leisaac
  name: pickorange-r16
  group: null
  mode: online

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
