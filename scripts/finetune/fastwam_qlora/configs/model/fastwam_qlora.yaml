# Mirrors fastwam/configs/model/fastwam.yaml but with knobs tweaked for
# LeIsaac SO-101 (6-DoF joint).  The QLoRA hook in train.py mutates the
# returned model in-place after instantiate(); no architectural changes here.

_target_: fastwam.runtime.create_fastwam
model_id: Wan-AI/Wan2.2-TI2V-5B
tokenizer_model_id: Wan-AI/Wan2.1-T2V-1.3B
tokenizer_max_len: 128
load_text_encoder: false  # rely on pre-cached UMT5 embeddings in dataset
proprio_dim: ${data.train.processor.proprio_output_dim}
redirect_common_files: true
mot_checkpoint_mixed_attn: false  # grad-ckpt + bnb 4bit + checkpoint recompute hit "bool has no shape" bug
action_dit_pretrained_path: checkpoints/ActionDiT_linear_interp_Wan22_alphascale_1024hdim.pt
skip_dit_load_from_pretrain: false

video_dit_config:
  has_image_input: false
  patch_size: [1, 2, 2]
  in_dim: 48
  hidden_dim: 3072
  ffn_dim: 14336
  freq_dim: 256
  text_dim: 4096
  out_dim: 48
  num_heads: 24
  attn_head_dim: 128
  num_layers: 30
  eps: 1.0e-06
  seperated_timestep: true
  require_clip_embedding: false
  require_vae_embedding: false
  fuse_vae_embedding_in_latents: true
  use_gradient_checkpointing: ${model.mot_checkpoint_mixed_attn}
  video_attention_mask_mode: "first_frame_causal"
  action_conditioned: false
  action_dim: ${data.train.processor.action_output_dim}
  action_group_causal_mask_mode: "group_diagonal"

action_dit_config:
  action_dim: ${data.train.processor.action_output_dim}
  hidden_dim: 1024
  ffn_dim: 4096
  num_heads: 24
  attn_head_dim: 128
  num_layers: 30
  text_dim: 4096
  freq_dim: 256
  eps: 1.0e-06
  use_gradient_checkpointing: ${model.mot_checkpoint_mixed_attn}

video_scheduler:
  train_shift: 5.0
  infer_shift: 5.0
  num_train_timesteps: 1000

action_scheduler:
  train_shift: 5.0
  infer_shift: 5.0
  num_train_timesteps: 1000

loss:
  # Rescue config (2026-05-18 morning):
  # Original run defaults (lambda_video=1.0 implicit + lambda_action=1.0)
  # failed BC: video token count (≈528 / sample) vs action token count (24)
  # means video loss gradient dominates by ~22×, drowning out action signal.
  # Set lambda_video=0 to force all gradient flow through action_expert
  # + action_encoder/head/proprio_encoder.  Forward through video DiT still
  # runs (compute wasted) but contributes 0 to backward.
  lambda_video: 0.0
  lambda_action: 1.0
